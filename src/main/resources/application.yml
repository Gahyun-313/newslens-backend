spring:
  application:
    name: newslens

  datasource:
    url: jdbc:h2:mem:newslens
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080

logging:
  level:
    com.newslens: DEBUG
    org.hibernate.SQL: DEBUG